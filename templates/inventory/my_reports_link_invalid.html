{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Link Invalid - TRACE Lost &amp; Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        html, body { overflow-x: hidden; max-width: 100vw; }
        .mobile-menu-overlay { display: none; }
        .mobile-menu-overlay.active {
            display: block; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5); z-index: 40;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">
<!-- Mobile Menu Button -->
<button id="mobile-menu-btn" class="xl:hidden fixed top-4 left-4 z-50 bg-[#0F172A] text-white p-3 rounded-xl shadow-lg">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
    </svg>
</button>

<!-- Mobile Menu Overlay -->
<div id="mobile-menu-overlay" class="mobile-menu-overlay" onclick="closeMobileMenu()"></div>

<div class="flex min-h-screen flex-nowrap">
  {% include "inventory/_sidebar_public.html" with sidebar_active="my_reports" %}

  <!-- MAIN AREA -->
  <main class="flex-1 overflow-y-auto p-4 sm:p-6 md:p-8 w-full xl:w-auto">
    <header class="mb-6 md:mb-8 flex flex-col sm:flex-row justify-between xl:justify-end items-start sm:items-center gap-4 pt-12 xl:pt-0">
      <div class="xl:hidden">
        <a href="{% url 'inventory:landing' %}" class="flex items-center gap-2">
          <div class="relative h-10 w-10">
            <div class="absolute inset-0 rounded-full bg-gradient-to-br from-teal-400 via-cyan-400 to-purple-500"></div>
            <div class="absolute -bottom-1 -left-1 h-6 w-3 rotate-45 rounded-full bg-gradient-to-br from-purple-400 to-purple-600"></div>
            <div class="absolute inset-2 flex items-center justify-center rounded-full bg-[#0F172A]">
              <svg viewBox="0 0 24 24" class="h-5 w-5 text-cyan-400" fill="currentColor">
                <rect x="4" y="6" width="16" height="12" rx="4" />
                <circle cx="9" cy="12" r="1.3" />
                <circle cx="15" cy="12" r="1.3" />
                <rect x="11" y="2" width="2" height="3" rx="1" />
              </svg>
            </div>
          </div>
          <h1 class="bg-gradient-to-r from-teal-300 to-purple-400 bg-clip-text text-2xl font-black tracking-tight text-transparent">Trace</h1>
        </a>
      </div>
      <a href="{% url 'inventory:item_list' %}" class="inline-block rounded-xl bg-slate-700 px-4 sm:px-6 py-2 sm:py-3 text-sm font-bold text-white shadow-lg transition hover:bg-slate-800 active:scale-95 text-center">Back to browse</a>
    </header>

    <div class="flex items-start justify-center py-8 sm:py-16">
      <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg p-8 text-center">
        <!-- Warning icon -->
        <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-full bg-amber-100">
            <svg class="h-8 w-8 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-slate-900 mb-3">Link invalid</h1>
        <p class="text-sm text-slate-500 leading-relaxed mb-6">{{ message }}</p>

        <a href="{% url 'inventory:my_reports' %}" class="inline-block rounded-xl bg-cyan-500 px-6 py-3 text-sm font-bold text-white shadow-lg shadow-cyan-500/20 transition hover:bg-cyan-600 active:scale-[0.98]">Request a new sign-in link</a>
      </div>
    </div>
  </main>
</div>

<script>
function openMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobile-menu-overlay');
    if (sidebar && overlay) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
}
function closeMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobile-menu-overlay');
    if (sidebar && overlay) {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
    }
}
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('mobile-menu-btn');
    if (btn) btn.addEventListener('click', openMobileMenu);
    document.querySelectorAll('#sidebar nav a').forEach(link => {
        link.addEventListener('click', function() {
            if (window.innerWidth < 1280) closeMobileMenu();
        });
    });
    window.addEventListener('resize', function() {
        if (window.innerWidth >= 1280) closeMobileMenu();
    });
});
</script>
</body>
</html>
